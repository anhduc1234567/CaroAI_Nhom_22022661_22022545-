<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caro AI - JS Simulation</title>
    <style>
        :root { 
            --cell-size: 35px; 
            --board-size: 15;
            --x-color: #ff4b4b;
            --o-color: #007bff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f8f9fa; 
            margin: 0;
            padding: 20px;
        }
        
        h1 { color: #333; margin-bottom: 10px; }

        #game-info { 
            margin-bottom: 20px; 
            font-size: 1.2rem; 
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* Container bàn cờ */
        #board {
            display: grid;
            grid-template-columns: repeat(var(--board-size), var(--cell-size));
            grid-template-rows: repeat(var(--board-size), var(--cell-size));
            gap: 1px;
            background-color: #bdc3c7;
            border: 3px solid #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Ô cờ */
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cell:hover { background-color: #ecf0f1; }

        /* Màu sắc quân cờ */
        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }
        
        /* TRẠNG THÁI KHÓA - QUAN TRỌNG NHẤT */
        #board.disabled {
            pointer-events: none; /* Không cho click */
            opacity: 0.7;
            cursor: wait;
        }

        /* Thông báo Bot đang nghĩ */
        .status-container {
            height: 40px;
            margin-top: 15px;
            display: flex;
            align-items: center;
        }

        .spinner { 
            display: none; 
            color: #666; 
            font-style: italic;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Nút Reset */
        .reset-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .reset-btn:hover { background-color: #27ae60; }
        .reset-btn:active { transform: translateY(2px); }
    </style>
</head>
<body>

    <h1>🎮 Caro AI</h1>

    <div id="game-info">Lượt của bạn: <span style="color: var(--x-color);">❌</span></div>

    <div style="margin-bottom: 20px;">
        <label for="difficulty">Độ khó Bot:</label>
        <select id="difficulty" style="padding: 5px 10px; border-radius: 5px;">
            <option value="a">Dễ (Minimax)</option>
            <option value="b">Khó (Alpha-Beta)</option>
        </select>
    </div>


    <div id="board">
        </div>

    <div class="status-container">
        <div id="status" class="spinner">🤖 Bot đang phân tích nước đi...</div>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 Chơi ván mới</button>

    <script src="scripts.js"></script>
</body>
</html>
