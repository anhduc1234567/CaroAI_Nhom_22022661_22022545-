<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caro AI - JS Simulation</title>
    <style>
        :root { 
            --cell-size: 35px; 
            --board-size: 15;
            --x-color: #ff4b4b;
            --o-color: #007bff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f8f9fa; 
            margin: 0;
            padding: 20px;
        }
        
        h1 { color: #333; margin-bottom: 10px; }

        #game-info { 
            margin-bottom: 20px; 
            font-size: 1.2rem; 
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* Container bàn cờ */
        #board {
            display: grid;
            grid-template-columns: repeat(var(--board-size), var(--cell-size));
            grid-template-rows: repeat(var(--board-size), var(--cell-size));
            gap: 1px;
            background-color: #bdc3c7;
            border: 3px solid #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Ô cờ */
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cell:hover { background-color: #ecf0f1; }

        /* Màu sắc quân cờ */
        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }
        
        /* TRẠNG THÁI KHÓA - QUAN TRỌNG NHẤT */
        #board.disabled {
            pointer-events: none; /* Không cho click */
            opacity: 0.7;
            cursor: wait;
        }

        /* Thông báo Bot đang nghĩ */
        .status-container {
            height: 40px;
            margin-top: 15px;
            display: flex;
            align-items: center;
        }

        .spinner { 
            display: none; 
            color: #666; 
            font-style: italic;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Nút Reset */
        .reset-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .controls {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .mode-selection {
            display: flex;
            gap: 20px;
            font-weight: bold;
        }

        .mode-selection label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .reset-btn:hover { background-color: #27ae60; }
        .reset-btn:active { transform: translateY(2px); }

        /* Layout chính chia 2 cột */
.main-container {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    margin-top: 20px;
}

/* Bảng lịch sử */
.history-panel {
    width: 220px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    height: 600px;
    display: flex;
    flex-direction: column;
}

.history-header {
    padding: 15px;
    background: #34495e;
    color: white;
    border-radius: 10px 10px 0 0;
    font-weight: bold;
    text-align: center;
}

#move-history {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    list-style: none;
    margin: 0;
}

#move-history li {
    padding: 8px 5px;
    border-bottom: 1px solid #eee;
    font-size: 0.85rem;
}

/* Cấu trúc tọa độ */
.board-wrapper { display: flex; flex-direction: column; }
.game-area { display: flex; }

.top-coords { display: flex; margin-left: 35px; } /* Lệch để khớp cột */
.side-coords { display: flex; flex-direction: column; }

.coord {
    width: 35px;
    height: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #95a5a6;
    font-size: 0.8rem;
}

.cell.last-move { background-color: #fff9c4 !important; }

.settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 10px;
}

.setting-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.setting-item label {
    font-size: 0.85rem;
    color: #7f8c8d;
    font-weight: bold;
}

.setting-item select {
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 5px;
    background-color: #fff;
    outline: none;
    cursor: pointer;
}

.setting-item select:focus {
    border-color: #3498db;
}

/* Hiệu ứng khi bị vô hiệu hóa */
select:disabled {
    background-color: #f5f5f5;
    cursor: not-allowed;
}
    </style>
</head>
<body>
    <h1>🎮 Caro AI</h1>

    <div class="main-container">
        <!-- BẢNG LỊCH SỬ BÊN TRÁI -->
        <div class="history-panel">
            <div class="history-header">Lịch sử nước đi</div>
            <ul id="move-history"></ul>
        </div>

        <!-- KHU VỰC BÀN CỜ -->
        <div class="right-panel">
            <div class="controls">
                <div class="mode-selection">
                    <label><input type="radio" name="game-mode" value="pve" checked onchange="changeMode()"> 👤 vs 🤖</label>
                    <!-- <label><input type="radio" name="game-mode" value="eve" onchange="changeMode()"> 🤖 vs 🤖</label> -->
                </div>
                <div class="setting-item">
            <label for="algo-select">Thuật toán:</label>
            <select id="algo-select" onchange="handleAlgoChange()">
                <option value="alpha-beta">Alpha-Beta Pruning</option>
                <option value="minimax">Minimax (Cơ bản)</option>
            </select>
        </div>

        <!-- Độ sâu (Depth) -->
        <div class="setting-item">
            <label for="depth-select">Độ sâu (Depth):</label>
            <select id="depth-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" id="opt-depth-4">4</option>
            </select>
        </div>

        <!-- Độ rộng (Radius) -->
        <div class="setting-item">
            <label for="radius-select">Độ rộng (Radius):</label>
            <select id="radius-select">
                <option value="1">1 (Nhanh)</option>
                <option value="2">2 (Bao quát)</option>
            </select>
        </div>
            </div>

            <div id="game-info">Lượt: <span id="current-turn" style="color: var(--x-color);">❌</span></div>

            <div class="board-wrapper">
                <!-- Tọa độ ngang -->
                <div class="top-coords" id="top-coords"></div>
                
                <div class="game-area">
                    <!-- Tọa độ dọc -->
                    <div class="side-coords" id="side-coords"></div>
                    <!-- Bàn cờ chính -->
                    <div id="board"></div>
                </div>
            </div>

            <div class="status-container">
                <div id="status" class="spinner">🤖 Bot đang phân tích nước đi...</div>
            </div>

            <div class="action-buttons">
                <button class="reset-btn" onclick="resetGame()">🔄 Chơi ván mới</button>
                <button id="start-bot-btn" class="reset-btn" style="background-color: #3498db; display:none;" onclick="startBotFight()">▶️ Bắt đầu đấu Bot</button>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body> 

</html>
