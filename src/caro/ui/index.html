<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caro AI - JS Simulation</title>
   <style>
:root { 
    --cell-size: 32px;
    --board-size: 15;

    --x-color: #ff4b4b;
    --o-color: #007bff;

    --bg: #f4f6f9;
    --panel: #ffffff;
    --border: #dfe6e9;
    --shadow: 0 3px 12px rgba(0,0,0,0.08);
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);

    height: 100vh;
    overflow: hidden;

    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 10px;
}

/* ===== TITLE ===== */

h1{
    font-size: 2rem;
    margin-bottom: 12px;
    color: #2c3e50;
}

/* ===== MAIN LAYOUT ===== */

.main-container{
    flex: 1;

    width: 100%;
    max-width: 1450px;

    display: flex;
    gap: 16px;

    overflow: hidden;
}

/* ===== HISTORY PANEL ===== */

.history-panel{
    width: 250px;
    min-width: 250px;

    background: var(--panel);
    border-radius: 14px;

    box-shadow: var(--shadow);

    display: flex;
    flex-direction: column;

    overflow: hidden;
}

.history-header{
    padding: 16px;

    background: #34495e;
    color: white;

    text-align: center;
    font-weight: bold;
    font-size: 1.1rem;
}

#move-history{
    flex: 1;

    overflow-y: auto;

    list-style: none;
    padding: 10px;
}

#move-history li{
    padding: 10px 8px;
    border-bottom: 1px solid #eee;

    font-size: 0.9rem;
}

/* ===== RIGHT PANEL ===== */

.right-panel{
    flex: 1;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== CONTROLS ===== */

.controls{
    width: 100%;

    background: var(--panel);

    border-radius: 14px;
    box-shadow: var(--shadow);

    padding: 14px 20px;

    display: flex;
    align-items: center;
    justify-content: space-between;

    flex-wrap: wrap;

    gap: 20px;

    margin-bottom: 14px;
}

.mode-selection{
    display: flex;
    gap: 20px;

    font-weight: bold;
}

.mode-selection label{
    display: flex;
    align-items: center;
    gap: 6px;

    cursor: pointer;
}

.setting-item{
    display: flex;
    align-items: center;
    gap: 8px;
}

.setting-item label{
    font-size: 0.9rem;
    font-weight: bold;
    color: #555;
}

.setting-item select{
    padding: 8px 10px;

    border-radius: 6px;
    border: 1px solid #dcdde1;

    background: white;

    cursor: pointer;
    outline: none;
}

.setting-item select:focus{
    border-color: #3498db;
}

/* ===== INFO ===== */

#game-info{
    margin-bottom: 14px;

    background: white;

    padding: 10px 18px;

    border-radius: 12px;

    box-shadow: var(--shadow);

    font-size: 1.1rem;
    font-weight: bold;
}

/* ===== BOARD WRAPPER ===== */

.board-wrapper{
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* TOP COORDS */

.top-coords{
    display: flex;

    margin-left: var(--cell-size);
}

/* GAME AREA */

.game-area{
    display: flex;
    align-items: flex-start;
}

/* SIDE COORDS */

.side-coords{
    display: flex;
    flex-direction: column;

    height: fit-content;
}

/* COORD */

.coord{
    width: var(--cell-size);
    height: var(--cell-size);

    display: flex;
    align-items: center;
    justify-content: center;

    color: #7f8c8d;

    font-size: 0.82rem;
    font-weight: bold;
}

/* ===== BOARD ===== */

#board{
    display: grid;

    grid-template-columns: repeat(var(--board-size), var(--cell-size));
    grid-template-rows: repeat(var(--board-size), var(--cell-size));

    gap: 1px;

    background: #b2bec3;

    border: 2px solid #34495e;

    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

/* ===== CELL ===== */

.cell{
    width: var(--cell-size);
    height: var(--cell-size);

    background: #ffffff;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.15s;
}

.cell:hover{
    background: #ecf0f1;
}

.cell.x{
    color: var(--x-color);
}

.cell.o{
    color: var(--o-color);
}

.cell.last-move{
    background: #fff3b0 !important;
}

/* ===== DISABLED ===== */

#board.disabled{
    pointer-events: none;
    opacity: 0.75;
    cursor: wait;
}

/* ===== STATUS ===== */

.status-container{
    height: 32px;

    margin-top: 12px;

    display: flex;
    align-items: center;
}

.spinner{
    display: none;

    color: #666;
    font-style: italic;

    animation: blink 1s infinite;
}

@keyframes blink{
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

/* ===== BUTTONS ===== */

.action-buttons{
    margin-top: 10px;

    display: flex;
    gap: 12px;
}

.reset-btn{
    padding: 11px 22px;

    border: none;
    border-radius: 8px;

    font-size: 0.95rem;
    font-weight: bold;

    color: white;

    cursor: pointer;

    transition: 0.2s;
}

.reset-btn:first-child{
    background: #2ecc71;
}

.reset-btn:first-child:hover{
    background: #27ae60;
}

#start-bot-btn{
    background: #3498db;
}

#start-bot-btn:hover{
    background: #2980b9;
}

.reset-btn:hover{
    transform: translateY(-1px);
}

.reset-btn:active{
    transform: scale(0.98);
}

/* ===== SCROLLBAR ===== */

::-webkit-scrollbar{
    width: 8px;
}

::-webkit-scrollbar-thumb{
    background: #cfd8dc;
    border-radius: 10px;
}

/* ===== RESPONSIVE ===== */

@media (max-height: 850px){
    :root{
        --cell-size: 28px;
    }
}

@media (max-height: 760px){
    :root{
        --cell-size: 24px;
    }
}

@media (max-width: 1100px){

    body{
        overflow-y: auto;
        height: auto;
    }

    .main-container{
        flex-direction: column;
    }

    .history-panel{
        width: 100%;
        min-height: 200px;
    }

    .controls{
        justify-content: center;
    }
}
</style>
</head>
<body>
    <h1>🎮 Caro AI</h1>

    <div class="main-container">
        <!-- BẢNG LỊCH SỬ BÊN TRÁI -->
        <div class="history-panel">
            <div class="history-header">Lịch sử nước đi</div>
            <ul id="move-history"></ul>
        </div>

        <!-- KHU VỰC BÀN CỜ -->
        <div class="right-panel">
            <div class="controls">
                <div class="mode-selection">
                    <label><input type="radio" name="game-mode" value="pve" checked onchange="changeMode()"> 👤 vs 🤖</label>
                    <!-- <label><input type="radio" name="game-mode" value="eve" onchange="changeMode()"> 🤖 vs 🤖</label> -->
                </div>
                <div class="setting-item">
            <label for="algo-select">Thuật toán:</label>
            <select id="algo-select" onchange="handleAlgoChange()">
                <option value="alpha-beta">Alpha-Beta Pruning</option>
                <option value="alpha-beta_v2">Alpha-Beta Pruning_v2</option>
                <option value="minimax">Minimax (Cơ bản)</option>

            </select>
        </div>

        <!-- Độ sâu (Depth) -->
        <div class="setting-item">
            <label for="depth-select">Độ sâu (Depth):</label>
            <select id="depth-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" id="opt-depth-4">4</option>
            </select>
        </div>

        <!-- Độ rộng (Radius) -->
        <div class="setting-item">
            <label for="radius-select">Độ rộng (Radius):</label>
            <select id="radius-select">
                <option value="1">1 (Nhanh)</option>
                <option value="2">2 (Bao quát)</option>
            </select>
        </div>
            </div>

            <div id="game-info">Lượt: <span id="current-turn" style="color: var(--x-color);">❌</span></div>

            <div class="board-wrapper">
                <!-- Tọa độ ngang -->
                <div class="top-coords" id="top-coords"></div>
                
                <div class="game-area">
                    <!-- Tọa độ dọc -->
                    <div class="side-coords" id="side-coords"></div>
                    <!-- Bàn cờ chính -->
                    <div id="board"></div>
                </div>
            </div>

            <div class="status-container">
                <div id="status" class="spinner">🤖 Bot đang phân tích nước đi...</div>
            </div>

            <div class="action-buttons">
                <button class="reset-btn" onclick="resetGame()">🔄 Chơi ván mới</button>
                <button id="start-bot-btn" class="reset-btn" style="background-color: #3498db; display:none;" onclick="startBotFight()">▶️ Bắt đầu đấu Bot</button>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body> 

</html>
